# shirOS — módulos WiFi a cargar al boot (belt-and-suspenders).
# El kernel detecta y carga estos automáticamente vía modalias en
# placas reconocidas, pero declararlos acá garantiza que se intente
# cargarlos aunque udev tenga algún glitch.

# Realtek WiFi 6 (RTL8852AE/BE/CE, RTL8851BE)
rtw89_pci
rtw89_8852be
rtw89_8852ae
rtw89_8852ce

# Intel WiFi (AX 200/210/211, BE 200, etc.) — el módulo iwlwifi
# ya carga por modalias pero lo declaramos por las dudas.
iwlwifi

# MediaTek WiFi (MT7921, MT7922 — laptops modernos)
mt7921e
