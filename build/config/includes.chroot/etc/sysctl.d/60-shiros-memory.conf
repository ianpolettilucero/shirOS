# shirOS — tuning de memoria.
#
# Default Linux: vm.swappiness=60 (agresivo, swappea aunque haya RAM).
# Con zram + earlyoom queremos lo opuesto: usar RAM tanto como se pueda,
# y solo swappear (a zram) cuando realmente hace falta.

# Solo swappear cuando MemAvailable está muy bajo. Reduce thrashing.
vm.swappiness = 10

# Cache de metadata FS: menos agresivo en reclaim para apps que abren
# muchos archivos (como Chromium con sus 1000 archivos por tab).
vm.vfs_cache_pressure = 50

# Dirty page writeback: más balanceado en SSDs.
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# OOM killer: panic en vez de hang si TODO falla (poco probable con
# earlyoom + zram, pero por las dudas reboot es preferible a hang
# eterno).
# Desactivado por default — earlyoom es nuestra primera línea.
# vm.panic_on_oom = 1
# kernel.panic = 10
