# shirOS — limites de journald.
#
# Default Debian: journal puede crecer a 4 GB. En máquinas con SSD chico
# (256 GB) eso es mucho. Limitamos a 50 MB total persistido, con buffer
# de 200 MB free space para no llenar el disco.

[Journal]
SystemMaxUse=50M
SystemKeepFree=200M
SystemMaxFileSize=10M
RuntimeMaxUse=20M
RuntimeKeepFree=100M
MaxFileSec=1week
ForwardToSyslog=no
