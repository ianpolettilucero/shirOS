# shirOS — autologin del user 'live' en la sesión live.
# Static por design — live-config en trixie tiene este path roto
# (Debian Bug #1094353), por eso lo manejamos a mano.
#
# En sistema instalado por Calamares: el user 'live' no existe (Calamares
# crea otro), LightDM intenta autologin como live, falla, cae al greeter
# normal pidiendo creds. La PR que limpia este archivo en post-install
# está pendiente; aceptable porque solo hay una pequeña demora antes del
# greeter, no un error visible al user.

[Seat:*]
autologin-user=live
autologin-user-timeout=0
autologin-session=xfce
user-session=xfce
greeter-hide-users=false
allow-guest=false
