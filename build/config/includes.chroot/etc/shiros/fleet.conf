# shirOS Fleet Metrics — config.
#
# DEFAULT: vacío. Silent by default (decisión 0004).
# El usuario final NO debe editar este archivo.
#
# Para activar el hook de monitoreo, el admin IT debería usar:
#
#   sudo shiros-fleet enable-pull --listen=0.0.0.0:9100
#   sudo shiros-fleet enable-push --url=https://pushgw.empresa.local/metrics/job/shiros
#   sudo shiros-fleet disable
#   sudo shiros-fleet status
#
# Ver: /etc/shiros/fleet.README.md
# Ver: docs/decisions/0004-silent-by-default-telemetry.md

# ─────────────────────────────────────────────────────────────
# Modo de operación: pull | push | disabled
# ─────────────────────────────────────────────────────────────
SHIROS_FLEET_MODE=disabled

# ─────────────────────────────────────────────────────────────
# Modo pull (Prometheus scrape de node_exporter)
# ─────────────────────────────────────────────────────────────
# Dirección donde node_exporter escucha. Default solo-localhost (inútil
# para fleet pero seguro). Para que Prometheus pueda scraping desde la
# red corporativa, usar "0.0.0.0:9100" y abrir firewall.
SHIROS_FLEET_LISTEN=127.0.0.1:9100

# Lista de colectores adicionales (separados por coma).
# Ver: https://github.com/prometheus/node_exporter#collectors
SHIROS_FLEET_PULL_COLLECTORS=

# ─────────────────────────────────────────────────────────────
# Modo push (Prometheus Pushgateway)
# ─────────────────────────────────────────────────────────────
# URL completa del pushgateway corporativo. Ej:
#   https://pushgw.empresa.local/metrics/job/shiros/instance/$HOSTNAME
# El hostname se sustituye automáticamente.
SHIROS_FLEET_PUSH_URL=

# Frecuencia del push (formato systemd OnCalendar o "Xm" / "Xh").
SHIROS_FLEET_PUSH_INTERVAL=5m

# Credenciales para basic auth (si el pushgateway lo requiere).
# Recomendado dejar vacío y usar mTLS o VPN-only access.
SHIROS_FLEET_PUSH_USER=
SHIROS_FLEET_PUSH_PASSWORD=

# Etiquetas adicionales (Prometheus labels, formato "k1=v1,k2=v2").
# El hostname y el OS se agregan automáticamente.
SHIROS_FLEET_LABELS=
