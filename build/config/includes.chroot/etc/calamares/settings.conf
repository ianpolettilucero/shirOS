# shirOS — Calamares main settings.
# Define el orden de los módulos del wizard y la política general.
# Doc: https://github.com/calamares/calamares/wiki

---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id: shiros-branding
    module: branding
    config: branding.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - bootloader-config
      - grubcfg
      - bootloader
      - packages
      - luksbootkeyfile
      - plymouthcfg
      - initramfscfg
      - initramfs
      - removeuser
      - umount
  - show:
      - finished

branding: shiros

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: false

hide-back-and-next-during-exec: false

quit-at-end: false
