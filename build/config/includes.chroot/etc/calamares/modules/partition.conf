# shirOS — partition module
# Soporta los 4 modos: erase, replace, alongside (dual-boot), manual.
---
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: 512M
efiSystemPartitionName: "EFI"

userSwapChoices:
    - none
    - small
    - suspend
    - file

drawNestedPartitions:   true
alwaysShowPartitionLabels: true

allowManualPartitioning: true

defaultFileSystemType:  "ext4"
availableFileSystemTypes:
    - ext4
    - btrfs
    - xfs

partitionLayout:
    - name: "ESP"
      filesystem: "fat32"
      mountPoint: "/boot/efi"
      size: 512M
    - name: "shiros-root"
      filesystem: "ext4"
      mountPoint: "/"
      size: 100%

initialPartitioningChoice: none
initialSwapChoice: none

# Dual-boot: detectar Windows existente y ofrecer "Install alongside"
# (handled internally por Calamares cuando detecta otro OS via os-prober).
