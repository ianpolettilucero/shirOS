# shirOS — users module
---
defaultGroups:
    - users
    - lp
    - cdrom
    - video
    - audio
    - plugdev
    - netdev
    - bluetooth
    - scanner
    - sudo

autologinGroup:  autologin
sudoersGroup:    sudo

setRootPassword: false
doAutologin:     false

passwordRequirements:
    minLength: 4
    maxLength: -1
    libpwquality:
        - minlen=0
        - minclass=0

allowWeakPasswords:    true
allowWeakPasswordsDefault: false
