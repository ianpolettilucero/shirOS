<?xml version="1.0" encoding="UTF-8"?>
<!-- Wallpaper especial para LightDM greeter: más oscuro para contraste con el formulario. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#374151"/>
      <stop offset="50%"  stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="60%"  stop-color="#3B82F6" stop-opacity="0.0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <circle cx="32" cy="32" r="1" fill="#9CA3AF" fill-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Cat silhouette large center, very subtle -->
  <g transform="translate(960, 460)" opacity="0.06">
    <path d="M -180,-60 L -120,-220 L -50,-80 Z" fill="#F5F5F5"/>
    <path d="M  180,-60 L  120,-220 L  50,-80 Z" fill="#F5F5F5"/>
    <ellipse cx="0" cy="10" rx="170" ry="150" fill="#F5F5F5"/>
  </g>
</svg>
