<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="shirOS">
  <title>shirOS</title>
  <desc>shirOS — gato gris geométrico + wordmark</desc>

  <!-- Cat head (silueta geométrica) -->
  <g transform="translate(48, 48)">
    <!-- Ears -->
    <path d="M -30,-10 L -20,-34 L -8,-14 Z" fill="#374151"/>
    <path d="M  30,-10 L  20,-34 L  8,-14 Z" fill="#374151"/>
    <!-- Inner ear -->
    <path d="M -25,-14 L -20,-26 L -14,-15 Z" fill="#9CA3AF"/>
    <path d="M  25,-14 L  20,-26 L  14,-15 Z" fill="#9CA3AF"/>
    <!-- Head -->
    <ellipse cx="0" cy="2" rx="28" ry="24" fill="#374151"/>
    <!-- White chin/chest accent -->
    <path d="M -10,18 Q 0,28 10,18 L 10,8 Q 0,12 -10,8 Z" fill="#F5F5F5"/>
    <!-- Eyes -->
    <ellipse cx="-10" cy="-2" rx="3" ry="5" fill="#F5F5F5"/>
    <ellipse cx="10" cy="-2" rx="3" ry="5" fill="#F5F5F5"/>
    <ellipse cx="-10" cy="-1" rx="1.5" ry="3.5" fill="#1F2937"/>
    <ellipse cx="10" cy="-1" rx="1.5" ry="3.5" fill="#1F2937"/>
    <!-- Nose -->
    <path d="M -2.5,8 L 2.5,8 L 0,11 Z" fill="#F5F5F5"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="60"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="42"
        letter-spacing="-0.02em"
        fill="#1F2937">shir<tspan fill="#3B82F6">OS</tspan></text>
</svg>
